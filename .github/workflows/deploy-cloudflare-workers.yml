name: Deploy Cloudflare Worker

"on":
  push:
    branches:
      - main
    paths-ignore:
      - '.gitignore'
      - '.npmrc'
      - '.prettierignore'
      - '.prettierrc'
      - 'AGENTS.md'
      - 'eslint.config.js'
      - 'LICENSE'
      - 'package.json'
      - 'package-lock.json'
      - 'README.md'
      - 'tsconfig.json'
  workflow_dispatch:

jobs:
  deploy:
    environment:
      name: Production
      url: https://collagejs.dev
      deployment: true
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACC_ID }}
